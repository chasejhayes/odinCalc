<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="container">
        <div id="display">
            <div id="initial">__</div>
            <div id="operator">__</div>
            <div id="secondary">__</div>
            <div id="result"></div>
        </div>
        <div id="rowOne">
            <button id="plus" onclick="operationPressed(plusSign)" >+</button>
            <button id="minus" onclick="operationPressed(minusSign)">-</button>
            <button id="mutiply" onclick="operationPressed(multiplySign)">x</button>
            <button id="divide" onclick = "operationPressed(divideSign)">/</button>
        </div>
        <div id="rowTwo">
            <button id="one" onclick="firstClick(1); secondClick(1)">1</button>
            <button id="two" onclick="firstClick(2); secondClick(2)">2</button>
            <button id="three" onclick="firstClick(3); secondClick(3)">3</button>
            <button id="four" onclick="firstClick(4); secondClick(4)">4</button>
        </div>

        <div id="rowThree">
            <button id="five" onclick="firstClick(5); secondClick(5)">5</button>
            <button id="six" onclick="firstClick(6); secondClick(6)">6</button>
            <button id="seven" onclick="firstClick(7); secondClick(7)">7</button>
            <button id="eight" onclick="firstClick(8); secondClick(8)">8</button>
        </div>
        <div id="rowFour">
            <button id="nine" onclick="firstClick(9); secondClick(9)">9</button>
            <button id="zero" onclick="firstClick(0); secondClick(0)">0</button>
            <button id="clear" onclick="clear()">c</button>
            <button id="equals" onclick="equals()">=</button>
        </div>
    </div>
  
    
</body>
</html>
