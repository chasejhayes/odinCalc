<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="container">
        <div id="display">
            <div id="initial">__</div>
            <div id="operator">__</div>
            <div id="secondary">__</div>
            <div id="result"></div>
        </div>
        <div id="rowOne">
            <button id="plus" onclick="clickPlus()">+</button>
            <button id="minus" onclick="clickMinus()">-</button>
            <button id="mutiply" onclick="clickMultiply()">x</button>
            <button id="divide" onclick = "clickDivide()">/</button>
        </div>
        <div id="rowTwo">
            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="four">4</button>
        </div>

        <div id="rowThree">
            <button id="five">5</button>
            <button id="six">6</button>
            <button id="seven">7</button>
            <button id="eight">8</button>
        </div>
        <div id="rowFour">
            <button id="nine">9</button>
            <button id="zero">0</button>
            <button id="clear">c</button>
            <button id="equals">=</button>
        </div>
    </div>
  
    
</body>
</html>
