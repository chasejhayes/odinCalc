<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="container">
        <div id="display">
            <div id="initial">__</div>
            <div id="operator">__</div>
            <div id="secondary">__</div>
            <div id="result"></div>
        </div>
        <div id="rowOne">
            <button id="plus" onclick="clickPlus(); storeValuePlus(plusSign)" >+</button>
            <button id="minus" onclick="clickMinus(); storeValueMinus(minusSign)">-</button>
            <button id="mutiply" onclick="clickMultiply(); storeValueMultiply(multiplySign)">x</button>
            <button id="divide" onclick = "clickDivide(); storeValueDivide(divideSign)">/</button>
        </div>
        <div id="rowTwo">
            <button id="one" onclick="bigClick(1)">1</button>
            <button id="two" onclick="bigClick(2)">2</button>
            <button id="three" onclick="bigClick(3)">3</button>
            <button id="four" onclick="bigClick(4)">4</button>
        </div>

        <div id="rowThree">
            <button id="five" onclick="bigClick(5)">5</button>
            <button id="six" onclick="bigClick(6)">6</button>
            <button id="seven" onclick="bigClick(7)">7</button>
            <button id="eight" onclick="bigClick(8)">8</button>
        </div>
        <div id="rowFour">
            <button id="nine" onclick="bigClick(9)">9</button>
            <button id="zero" onclick="bigClick(0)">0</button>
            <button id="clear">c</button>
            <button id="equals" onclick="operate(initialNumber, secondaryNumber, operator)">=</button>
        </div>
    </div>
  
    
</body>
</html>
